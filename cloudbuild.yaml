substitutions:
  # The region for the Cloud Run deployment
  _REGION: us-central1

# ==================================================================
# BUILD OPTIONS (Fixes the logging/service_account conflict)
# ==================================================================
options:
  # This setting tells Cloud Build to use the standard, user-owned regional log bucket.
  # This satisfies the requirement when a service account is specified, resolving the error.
  default_logs_bucket_behavior: 'REGIONAL_USER_OWNED_BUCKET'

steps:
  # ==================================================================
  # Step 1: Run Unit Tests (Backend)
  # ==================================================================
  - name: 'python:3.11-slim'
    id: Test-Backend
    dir: 'backend'
    entrypoint: 'sh'
    args:
      - -c
      - |
          Install dependencies, including cryptography and pytest
          pip install -r requirements.txt

          Run tests
          echo "--- Executing Unit Tests ---"
          pytest
          if [ $$? -ne 0 ]; then
            echo "Tests failed! Aborting deployment."
            exit 1
          fi
          echo "--- Tests passed successfully! ---"

  # ==================================================================
  # Step 2: Build Docker Image (Backend)
  # ==================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: Build-Backend-Image
    waitFor: ['Test-Backend'] # Ensures tests pass before building
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/password-backend'
      - '.'
    dir: 'backend'

  # ==================================================================
  # Step 3: Push Docker Image to Google Container Registry
  # ==================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: Push-Backend-Image
    waitFor: ['Build-Backend-Image']
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/password-backend'

  # ==================================================================
  # Step 4: Deploy to Cloud Run (Backend)
  # ==================================================================
  - name: 'gcr.io/cloud-builders/gcloud'
    id: Deploy-Backend
    waitFor: ['Push-Backend-Image']
    args:
      - 'run'
      - 'deploy'
      - 'password-backend' # Cloud Run service name
      - '--image'
      - 'gcr.io/$PROJECT_ID/password-backend'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--update-env-vars'
      - 'FRONTEND_URL=${_FRONTEND_URL},MONGO_URI=${_MONGO_URI},SECRET_KEY=${_SECRET_KEY}'