This is the CI/CD pipeline configuration file for Google Cloud Build.

It defines four steps: Test, Build, Push, and Deploy.

Global environment variables (must match the substitutions set in the trigger UI)

substitutions:
_REGION: us-central1

steps:

==================================================================

Step 1: Run Unit Tests (Backend)

==================================================================

name: 'python:3.11-slim'
id: Test-Backend
workingDirectory: 'backend'
entrypoint: 'sh'
args:

'-c'

|

Install dependencies, including pytest

pip install -r requirements.txt

Run tests

echo "--- Executing Unit Tests ---"
pytest
if [ $$? -ne 0 ]; then
echo "Tests failed! Aborting deployment."
exit 1
fi
echo "--- Tests passed successfully! ---"

==================================================================

Step 2: Build Docker Image (Backend)

==================================================================

name: 'gcr.io/cloud-builders/docker'
id: Build-Backend-Image
waitFor: ['Test-Backend']
args:

'build'

'-t'

'gcr.io/$PROJECT_ID/password-backend'

'.'
dir: 'backend'

==================================================================

Step 3: Push Docker Image to Google Container Registry

==================================================================

name: 'gcr.io/cloud-builders/docker'
id: Push-Backend-Image
waitFor: ['Build-Backend-Image']
args:

'push'

'gcr.io/$PROJECT_ID/password-backend'

==================================================================

Step 4: Deploy to Cloud Run (Backend)

Uses the substitution variables defined in the trigger.

==================================================================

name: 'gcr.io/cloud-builders/gcloud'
id: Deploy-Backend
waitFor: ['Push-Backend-Image']
args:

'run'

'deploy'

'password-backend'

'--image'

'gcr.io/$PROJECT_ID/password-backend'

'--region'

'${_REGION}'

'--platform'

'managed'

'--allow-unauthenticated'

'--update-env-vars'

IMPORTANT: The variables below must match the names defined in your Cloud Build Trigger

'FRONTEND_URL=${_FRONTEND_URL},MONGO_URI=${_MONGO_URI},SECRET_KEY=${_SECRET_KEY}'

options:
machineType: 'E2_HIGHCPU_8'