substitutions:
  # The region for the Cloud Run deployment
  _REGION: us-central1
  # CRITICAL: The secure Fernet key generated by the user.
  _SECRET_KEY: 8myu6DVKpyPqI1MzcFX1ZN9sCeV2NbVJBb1ix3q3k6A= 
  # CRITICAL: PASTE YOUR MONGODB CONNECTION STRING HERE
  _MONGO_URI: mongodb+srv://app-user:Davidejuve04@app-user.m6bcgyo.mongodb.net/?appName=app-user

# ==================================================================
# BUILD OPTIONS
# ==================================================================
options:
  # Explicitly use Cloud Logging to bypass the missing GCS logs bucket.
  logging: CLOUD_LOGGING_ONLY

# CRITICAL: Specify the service account created to fix permissions
serviceAccount: projects/password-health-tracker-1/serviceAccounts/cloudbuild-sa@password-health-tracker-1.iam.gserviceaccount.com

steps:
  # ==================================================================
  # Step 1: Run Unit Tests (Backend)
  # ==================================================================
  - name: 'python:3.11-slim'
    id: Test-Backend
    dir: 'backend'
    entrypoint: 'sh'
    args:
      - -c
      - |
          echo "--- Installing Dependencies, Pytest, and Mongomock ---"
          pip install -r requirements.txt pytest mongomock

          # Set dummy environment variables for testing only.
          export SECRET_KEY='A_MOCK_KEY_FOR_TESTING_ONLY_MUST_BE_32_BYTES_OR_MORE'
          # Set a dummy URI for testing purposes (mongomock bypasses the real connection)
          export MONGO_URI='mongodb://localhost:27017/test_db'

          echo "--- Executing Unit Tests (Verbose Output) ---"
          pytest -v 
          if [ $$? -ne 0 ]; then
            echo "Tests failed! Aborting deployment."
            exit 1
          fi
          echo "--- Tests passed successfully! ---"

  # ==================================================================
  # Step 2: Build Docker Image (Backend)
  # ==================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: Build-Backend-Image
    waitFor: ['Test-Backend']
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/password-backend'
      - '.'
    dir: 'backend'

  # ==================================================================
  # Step 3: Push Docker Image to Google Container Registry
  # ==================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: Push-Backend-Image
    waitFor: ['Build-Backend-Image']
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/password-backend'

  # ==================================================================
  # Step 4: Deploy to Cloud Run (Backend) - FINAL CONFIGURATION
  # ==================================================================
  - name: 'gcr.io/cloud-builders/gcloud'
    id: Deploy-Backend
    waitFor: ['Push-Backend-Image']
    args:
      - 'run'
      - 'deploy'
      - 'password-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/password-backend'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # CRITICAL: Pass the SECRET_KEY and MONGO_URI to the runtime environment
      - '--set-env-vars'
      - 'SECRET_KEY=${_SECRET_KEY},MONGO_URI=${_MONGO_URI}'

  # ==================================================================
  # Step 5: Build Docker Image (Frontend)
  # ==================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: Build-Frontend-Image
    waitFor: ['Deploy-Backend']
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/password-frontend'
      - 'frontend'
    dir: '.'

  # ==================================================================
  # Step 6: Push Docker Image (Frontend)
  # ==================================================================
  - name: 'gcr.io/cloud-builders/docker'
    id: Push-Frontend-Image
    waitFor: ['Build-Frontend-Image']
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/password-frontend'

  # ==================================================================
  # Step 7: Deploy to Cloud Run (Frontend)
  # ==================================================================
  - name: 'gcr.io/cloud-builders/gcloud'
    id: Deploy-Frontend
    waitFor: ['Push-Frontend-Image']
    args:
      - 'run'
      - 'deploy'
      - 'password-frontend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/password-frontend'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'