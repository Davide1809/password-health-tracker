server {
    # Cloud Run si aspetta che il container ascolti sulla porta 8080
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # React routing
    location / {
        try_files $uri /index.html;
    }

    # Proxy per backend (inoltra le chiamate /api/ al backend Cloud Run)
    location /api/ {
        # L'URL del tuo backend Cloud Run
        proxy_pass https://password-backend-749522457256.us-central1.run.app; 
        
        # CORREZIONE CRITICA: Dobbiamo forzare l'intestazione Host
        proxy_set_header Host password-backend-749522457256.us-central1.run.app;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}