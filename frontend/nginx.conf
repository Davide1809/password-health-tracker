server {
    listen 8080;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # CORREZIONE 1: Aggiunge $uri/ per trovare correttamente i file statici (CSS/JS).
    location / {
        try_files $uri $uri/ /index.html; 
    }

    # Proxy per backend (inoltra le chiamate /api/ al backend Cloud Run)
    location /api/ {
        # L'URL del tuo backend Cloud Run
        proxy_pass https://password-backend-749522457256.us-central1.run.app; 
        
        # CORREZIONE 2: Rimuove l'intestazione Host non necessaria per Cloud Run.
        # proxy_set_header Host password-backend-749522457256.us-central1.run.app; <--- Questa riga deve essere tolta
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}